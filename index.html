async function dk(pw,salt){var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:210000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"])}
async function unlock(){var err=document.getElementById("err");err.textContent="";try{var pw=document.getElementById("pw").value;var key=await dk(pw,unb64(SALT));var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:unb64(IV)},key,unb64(CT));var html=new TextDecoder().decode(pt);document.open();document.write(html);document.close();}catch(e){err.textContent="Wrong password — try again.";}}
